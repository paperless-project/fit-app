# Ajustes para desarrollo: hot-reload y volumenes montados.
# Compose carga este fichero automaticamente cuando esta presente.

services:
  api:
    command: uvicorn fitapp.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_FROM: noreply@fit-app.local
      FRONTEND_URL: http://localhost:5173
    volumes:
      - ./apps/api:/app
      - /workspace/xabi/Activities:/activities:ro
      # El venv vive en /opt/venv (fuera de /app) para que el volumen de codigo
      # no lo sobreescriba — se rellena la primera vez desde la imagen construida
      - api_venv:/opt/venv

  web:
    command: pnpm run dev --host
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules

  adminer:
    image: adminer:latest
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:8080"

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1026:1025"   # SMTP (1025 del host ocupado por otro proceso)
      - "8026:8025"   # Web UI

volumes:
  api_venv:
  web_node_modules:
